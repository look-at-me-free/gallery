<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Gallery Archive</title>

  <meta name="theme-color" content="#0b0b0f" />
  <meta name="description" content="A curated image archive and gallery viewer." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <main class="boot-screen" aria-live="polite">
      <div class="boot-panel">
        <div class="boot-kicker">Gallery Viewer</div>
        <h1 class="boot-title">Loading Archive</h1>
        <p class="boot-copy">
          Preparing the collection, captions, and browsing interface.
        </p>
        <div class="boot-bar">
          <span class="boot-bar-fill"></span>
        </div>
      </div>
    </main>

    <noscript>
      <div class="no-js-warning">
        This gallery needs JavaScript enabled to load images from
        <code>links.txt</code> and optional captions from <code>captions.txt</code>.
      </div>
    </noscript>
  </div>

  <script src="index.js"></script>
</body>
</html>
